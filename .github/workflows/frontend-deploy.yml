name: Frontend CI/CD to S3 & CloudFront

on:
  push:
    branches:
      - dev_fe  # dev_fe 브랜치에 push될 때만 실행

permissions:
  actions: read
  contents: read
  id-token: none

jobs:
  deploy:
    name: Build & Deploy Frontend
    runs-on: ubuntu-latest
    environment: production

    steps:
      # 1) 코드 가져오기
      - name: Checkout repository
        uses: actions/checkout@v3

      # 2) Node.js 설치
      - name: Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '20'

      # 3) 로컬 이미지 삭제
      - name: Delete local facility images before build
        run: |
          rm -rf public/img

      # 4) 의존성 설치 & 빌드
      - name: Install dependencies & Build
        run: |
          npm ci
          npm run build

      # 5-1) Snyk 테스트 실행
      - name: Run Snyk test
        uses: snyk/actions/node@0.4.0
        with:
          command: test
          args: --debug
        env:
          SNYK_TOKEN: ${{ secrets.SNYK_TOKEN }}
        continue-on-error: true

      # 5-2) Snyk 모니터링
      - name: Run Snyk monitor
        uses: snyk/actions/node@0.4.0
        with:
          command: monitor
        env:
          SNYK_TOKEN: ${{ secrets.SNYK_TOKEN }}
        continue-on-error: true

      # 6) S3에 정적 파일 동기화 (강제 실패 테스트)
      - name: Sync build to S3
        run: |
          echo "강제 실패 테스트: S3 동기화 실패 처리"
          echo "배포 실패: S3 동기화에 실패했습니다." >> fail.log
          exit 1
        env:
          AWS_S3_BUCKET: ${{ secrets.AWS_S3_BUCKET }}
          AWS_REGION: ap-northeast-2
          AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}


      # 7) CloudFront 캐시 무효화 (실패 시 fail.log 기록)
      - name: Invalidate CloudFront Cache
        run: |
          if ! aws cloudfront create-invalidation --distribution-id ${{ secrets.CLOUDFRONT_DISTRO_ID }} --paths "/*"; then
            echo "배포 실패: CloudFront 캐시 무효화에 실패했습니다." >> fail.log
            exit 1
          fi
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          AWS_REGION: ap-northeast-2
          CLOUDFRONT_DISTRO_ID: ${{ secrets.CLOUDFRONT_DISTRO_ID }}

      # 8) OWASP ZAP 동적 분석 실행
      - name: Run OWASP ZAP Baseline Scan
        run: |
          mkdir -p zap-reports
          docker run --rm \
            --user root \
            -v ${{ github.workspace }}/zap-reports:/zap/wrk:rw \
            -t ghcr.io/zaproxy/zaproxy \
            zap-baseline.py \
              -t https://${{ secrets.CLOUDFRONT_DOMAIN }} \
              -r zap_report.html \
              -w zap_report.md || true

      # 9) 리포트 업로드
      - name: Upload ZAP HTML Report
        uses: actions/upload-artifact@v4
        with:
          name: zap-report-html
          path: zap-reports/zap_report.html

      # 10) 실패 시 Discord 알림
      - name: 실패 시 Discord 알림
        if: failure()
        run: |
          STEP_NAME=$(cat fail.log 2>/dev/null || echo "알 수 없는 실패 단계")
          ACTOR="${{ github.actor }}"
          AUTHOR="${{ github.event.head_commit.author.name }}"
          COMMIT_MSG="${{ github.event.head_commit.message }}"
          REPO="${GITHUB_REPOSITORY}"
          BRANCH="${GITHUB_REF_NAME}"
          RUN_URL="${GITHUB_SERVER_URL}/${GITHUB_REPOSITORY}/actions/runs/${GITHUB_RUN_ID}"

          if echo "$STEP_NAME" | grep -qiE "배포|deploy|s3|cloudfront"; then
            SEVERITY="심각(Critical) 🔥"
            COLOR=16711680 # 빨간색
          else
            SEVERITY="중간(Medium) ⚠"
            COLOR=15844367 # 노란색
          fi

          PAYLOAD=$(jq -n \
            --arg title "🚨 프론트엔드 CI/CD 실패 알림" \
            --arg desc "**실패 단계:** $STEP_NAME\n**심각도:** $SEVERITY" \
            --arg actor "$ACTOR" \
            --arg author "$AUTHOR" \
            --arg repo "$REPO" \
            --arg branch "$BRANCH" \
            --arg commit "$COMMIT_MSG" \
            --arg url "$RUN_URL" \
            --argjson color $COLOR \
            '{embeds: [{title: $title, description: $desc, color: $color,
              fields: [
                {name: "푸시한 사람", value: $actor, inline: true},
                {name: "커밋 작성자", value: $author, inline: true},
                {name: "레포지토리", value: $repo, inline: true},
                {name: "브랜치", value: $branch, inline: true},
                {name: "커밋 메시지", value: $commit, inline: false},
                {name: "실행 결과 보기", value: $url, inline: false}
              ]}]}')

          curl -X POST -H "Content-Type: application/json" \
            -d "$PAYLOAD" \
            "${{ secrets.DISCORD_WEBHOOK }}"
