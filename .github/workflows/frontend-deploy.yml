name: Frontend CI/CD to S3 & CloudFront

on:
  push:
    branches:
      - dev_fe  # dev_fe 브랜치에 push될 때만 실행

permissions:
  actions: read
  contents: read
  id-token: none

jobs:
  deploy:
    name: Build & Deploy Frontend
    runs-on: ubuntu-latest
    environment: production

    steps:
      # 1) 코드 가져오기
      - name: Checkout repository
        uses: actions/checkout@v3

      # 2) Node.js 설치
      - name: Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '20'

      # 3) 로컬 이미지 삭제
      - name: Delete local facility images before build
        run: |
          rm -rf public/img

      # 4) 의존성 설치 & 빌드
      - name: Install dependencies & Build
        run: |
          npm ci
          npm run build

      # 5-1) Snyk 테스트 실행
      - name: Run Snyk test
        uses: snyk/actions/node@0.4.0
        with:
          command: test
          args: --debug
        env:
          SNYK_TOKEN: ${{ secrets.SNYK_TOKEN }}
        continue-on-error: true

      # 5-2) Snyk 모니터링 (옵션)
      - name: Run Snyk monitor
        uses: snyk/actions/node@0.4.0
        with:
          command: monitor
        env:
          SNYK_TOKEN: ${{ secrets.SNYK_TOKEN }}
        continue-on-error: true

      # 6) S3에 정적 파일 동기화
      - name: Sync build to S3
        uses: jakejarvis/s3-sync-action@v0.5.1
        with:
          args: ""
        env:
          AWS_S3_BUCKET: ${{ secrets.AWS_S3_BUCKET }}
          AWS_REGION: ap-northeast-2
          AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          SOURCE_DIR: build

      # 7) CloudFront 캐시 무효화
      - name: Invalidate CloudFront Cache
        uses: chetan/invalidate-cloudfront-action@v2
        env:
          DISTRIBUTION: ${{ secrets.CLOUDFRONT_DISTRO_ID }}
          PATHS: "/*"
          AWS_REGION: ap-northeast-2
          AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}

      # 8) OWASP ZAP 동적 분석 실행
      - name: Run OWASP ZAP Baseline Scan (HTML Report)
        run: |
          docker run --rm -v $(pwd):/zap/wrk:rw -t owasp/zap2docker-stable zap-baseline.py \
            -t https://${{ secrets.CLOUDFRONT_DOMAIN }} \
            -r zap_report.html || true

      # 9) 리포트 업로드
      - name: Upload ZAP Report
        uses: actions/upload-artifact@v4
        with:
          name: zap-report
          path: zap_report.html
