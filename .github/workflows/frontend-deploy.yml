name: Frontend CI/CD to S3 & CloudFront

on:
  push:
    branches:
      - dev_fe  # dev_fe 브랜치에 push될 때만 실행

permissions:
  actions: read         # 워크플로에서 다른 액션 실행 허용
  contents: read        # 리포지토리 코드 읽기
  id-token: none        # OIDC 미사용 시 none

jobs:
  deploy:
    name: Build & Deploy Frontend
    runs-on: ubuntu-latest
    environment: production

    steps:
      # 1) 코드 가져오기
      - name: Checkout repository
        uses: actions/checkout@v3

      # 2) Node.js 설치
      - name: Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '18'

      # 3) 의존성 설치 & 빌드
      - name: Install dependencies & Build
        run: |
          npm ci
          npm run build

      # 4) Snyk 보안 취약점 검사
      - name: Run Snyk to check for vulnerabilities
        uses: snyk/actions/node@0.4.0  # 최신 버전 유지 중
        env:
          SNYK_TOKEN: ${{ secrets.SNYK_TOKEN }}
        with:
          args: test --debug && snyk monitor      # 디버깅 로그 추가
        continue-on-error: true        # Snyk 실패해도 배포 계속

      # 5) S3에 정적 파일 동기화
      - name: Sync build to S3
        uses: jakejarvis/s3-sync-action@v0.5.1
        with:
          args: --delete
        env:
          AWS_S3_BUCKET: ${{ secrets.AWS_S3_BUCKET }}
          AWS_REGION: ap-northeast-2
          AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          SOURCE_DIR: build

      # 6) CloudFront 캐시 무효화
      - name: Invalidate CloudFront Cache
        uses: chetan/invalidate-cloudfront-action@v2
        env:
          DISTRIBUTION: ${{ secrets.CLOUDFRONT_DISTRO_ID }}
          PATHS: "/*"
          AWS_REGION: ap-northeast-2
          AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
